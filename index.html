<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tenda di Convegno</title>
<meta name="theme-color" content="#1a1208">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C8A44A;--gold2:#E2C47A;
  --gd:rgba(200,164,74,0.13);--gb:rgba(200,164,74,0.22);
  --bg:#0D0B07;--s1:#1A1610;--s2:#221D13;--s3:#2A2418;
  --tx:#EDE5D0;--tx2:#B8A880;--mu:#6A5F42;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'EB Garamond',Georgia,serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
/* HEADER */
.hdr{flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--gb);padding:10px 16px;display:flex;align-items:center;gap:10px}
.brand{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.brand h1{font-family:'Cinzel',serif;font-size:16px;font-weight:600;color:var(--gold);letter-spacing:.04em;white-space:nowrap}
.brand p{font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:var(--mu);margin-top:2px}
/* TABS */
.tabs{flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--gb);display:flex}
.tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--mu);font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:12px 6px;cursor:pointer;transition:color .2s,border-color .2s}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
/* SEARCH BARS */
.sbar{flex-shrink:0;background:var(--s2);border-bottom:1px solid var(--gb);padding:9px 13px;gap:8px;display:none}
.sbar.show{display:flex}
.sbar input{flex:1;background:var(--bg);border:1px solid var(--gb);border-radius:6px;padding:8px 13px;color:var(--tx);font-family:'EB Garamond',serif;font-size:15px;outline:none}
.sbar input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gd)}
.btn{background:var(--gold);color:#0D0B07;border:none;border-radius:6px;padding:8px 15px;font-family:'Cinzel',serif;font-weight:600;font-size:12px;cursor:pointer;white-space:nowrap;transition:background .2s}
/* PANELS */
.panels{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;overflow-y:auto;padding:18px 16px 40px;display:none;scrollbar-width:thin}
.panel.on{display:block}
/* BIBLE CONTENT */
.ch-head{font-family:'Cinzel',serif;font-size:17px;font-weight:600;color:var(--gold);margin-bottom:14px}
.verse-wrap{margin-bottom:12px;border-bottom:1px solid rgba(200,164,74,0.05);padding-bottom:8px}
.verse{display:flex;gap:10px;align-items:flex-start}
.vnum{flex-shrink:0;font-family:'Cinzel',serif;font-size:9px;color:var(--gold);margin-top:6px;min-width:20px;text-align:right;opacity:.65}
.vtxt{font-size:18px;line-height:1.78;flex:1}
.vstudy-btn{color:var(--mu);cursor:pointer;font-size:16px;padding:2px 8px;transition:color .2s}
.vstudy-btn:hover{color:var(--gold2)}
/* STUDY BOX */
.study-box{background:rgba(200,164,74,0.03);border-left:2px solid var(--gold);margin:10px 0 10px 30px;padding:12px;display:none;border-radius:0 4px 4px 0}
.study-box div{margin-bottom:10px;line-height:1.6}
.study-box strong{font-family:'Cinzel',serif;font-size:10px;color:var(--gold2);display:block;margin-bottom:2px;letter-spacing:0.1em}
/* DIZIONARIO & VOTD (Stili originali) */
.dict-card{background:var(--s2);border:1px solid var(--gb);border-radius:10px;padding:18px 20px 22px}
.votd{background:linear-gradient(135deg,var(--s2),var(--s3));border:1px solid var(--gb);border-radius:10px;padding:20px 22px;margin-bottom:22px}
.votd-txt{font-size:20px;line-height:1.65;font-style:italic;margin-bottom:12px}
.votd-ref{font-family:'Cinzel',serif;font-size:12px;color:var(--gold2);text-align:right}
.spinner{width:26px;height:26px;border:2px solid var(--gd);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="brand">
      <span style="font-size:22px">⛺</span>
      <div><h1>Tenda di Convegno</h1><p>Studio Pentecostale Profondo</p></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab-home" onclick="showTab('home')">Oggi</button>
    <button class="tab" id="tab-bibbia" onclick="showTab('bibbia')">Bibbia</button>
    <button class="tab" id="tab-diz" onclick="showTab('diz')">Dizionario</button>
  </div>

  <div class="sbar" id="sbar-bibbia">
    <input id="bIn" placeholder="Es: Giovanni 3 · Romani 8:28..." autocomplete="off">
    <button class="btn" onclick="searchBible()">CERCA</button>
  </div>
  <div class="sbar" id="sbar-diz">
    <input id="dIn" placeholder="Cerca nel dizionario..." autocomplete="off">
    <button class="btn" onclick="searchDict()">CERCA</button>
  </div>

  <div class="panels">
    <div class="panel on" id="p-home">
      <div class="votd">
        <div id="vtxt" class="votd-txt">Caricamento versetto...</div>
        <div id="vref" class="votd-ref"></div>
      </div>
      <div style="color:var(--mu); padding:10px; text-align:center; font-style:italic">
        "Lampada al mio piede è la tua parola, luce sul mio cammino."
      </div>
    </div>

    <div class="panel" id="p-bibbia">
      <div id="bcontent">
         <div style="text-align:center; color:var(--mu); margin-top:50px">Inserisci un libro e un capitolo per iniziare lo studio.</div>
      </div>
    </div>

    <div class="panel" id="p-diz">
      <div id="dcontent"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// LOGICA NAVIGAZIONE & DATI
// ═══════════════════════════════════════════════
const BOOKS=[[1,['genesi','gen'],'Genesi'],[2,['esodo'],'Esodo'],[3,['levitico','lev'],'Levitico'],[4,['numeri','num'],'Numeri'],[5,['deuteronomio','deut'],'Deuteronomio'],[6,['giosue','gios'],'Giosuè'],[7,['giudici','giud'],'Giudici'],[8,['rut'],'Rut'],[9,['1 samuele','1sam'],'1 Samuele'],[10,['2 samuele','2sam'],'2 Samuele'],[11,['1 re','i re'],'1 Re'],[12,['2 re','ii re'],'2 Re'],[13,['1 cronache','1cron'],'1 Cronache'],[14,['2 cronache','2cron'],'2 Cronache'],[15,['esdra'],'Esdra'],[16,['neemia'],'Neemia'],[17,['ester'],'Ester'],[18,['giobbe'],'Giobbe'],[19,['salmi','salmo','sal'],'Salmi'],[20,['proverbi','prov'],'Proverbi'],[21,['ecclesiaste','eccl'],'Ecclesiaste'],[22,['cantico dei cantici','cantico','cant'],'Cantico'],[23,['isaia'],'Isaia'],[24,['geremia','ger'],'Geremia'],[25,['lamentazioni','lam'],'Lamentazioni'],[26,['ezechiele'],'Ezechiele'],[27,['daniele','dan'],'Daniele'],[28,['osea'],'Osea'],[29,['gioele'],'Gioele'],[30,['amos'],'Amos'],[31,['abdia','abd'],'Abdia'],[32,['giona'],'Giona'],[33,['michea','mic'],'Michea'],[34,['naum'],'Naum'],[35,['abacuc','abac'],'Abacuc'],[36,['sofonia','sof'],'Sofonia'],[37,['aggeo','agg'],'Aggeo'],[38,['zaccaria','zacc'],'Zaccaria'],[39,['malachia','mal'],'Malachia'],[40,['matteo','mat'],'Matteo'],[41,['marco','mar'],'Marco'],[42,['luca'],'Luca'],[43,['giovanni','gv'],'Giovanni'],[44,['atti'],'Atti'],[45,['romani','rom'],'Romani'],[46,['1 corinzi','1cor'],'1 Corinzi'],[47,['2 corinzi','2cor'],'2 Corinzi'],[48,['galati','gal'],'Galati'],[49,['efesini'],'Efesini'],[50,['filippesi','fil'],'Filippesi'],[51,['colossesi','col'],'Colossesi'],[52,['1 tessalonicesi','1ts'],'1 Tessalonicesi'],[53,['2 tessalonicesi','2ts'],'2 Tessalonicesi'],[54,['1 timoteo','1tim'],'1 Timoteo'],[55,['2 timoteo','2tim'],'2 Timoteo'],[56,['tito'],'Tito'],[57,['filemone'],'Filemone'],[58,['ebrei'],'Ebrei'],[59,['giacomo','giac'],'Giacomo'],[60,['1 pietro','1pt'],'1 Pietro'],[61,['2 pietro','2pt'],'2 Pietro'],[62,['1 giovanni','1gv'],'1 Giovanni'],[63,['2 giovanni','2gv'],'2 Giovanni'],[64,['3 giovanni','3gv'],'3 Giovanni'],[65,['giuda'],'Giuda'],[66,['apocalisse','apoc'],'Apocalisse']];

function norm(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim(); }

function parseRef(raw){
  const lo=norm(raw);
  const cands=[];
  for(const [num,aliases,label] of BOOKS) for(const a of aliases) cands.push({num,label,alias:a});
  cands.sort((a,b)=>b.alias.length-a.alias.length);
  for(const {num,label,alias} of cands){
    if(lo===alias||lo.startsWith(alias+' ')||lo.startsWith(alias+':')){
      const rest=lo.slice(alias.length).trim();
      const m=rest.match(/^(\d+)(?:[:\s,.](\d+)(?:\s*[-–]\s*(\d+))?)?/);
      if(!m) return null;
      return{num,label,ch:parseInt(m[1]),vf:m[2]?parseInt(m[2]):null,vt:m[3]?parseInt(m[3]):null};
    }
  }
  return null;
}

function showTab(n){
  ['home','bibbia','diz'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('on',t===n);
    document.getElementById('p-'+t).classList.toggle('on',t===n);
    const sb = document.getElementById('sbar-'+t); if(sb) sb.classList.toggle('show',t===n);
  });
}

// ═══════════════════════════════════════════════
// RICERCA BIBBIA
// ═══════════════════════════════════════════════
async function searchBible() {
  const raw = document.getElementById('bIn').value.trim();
  if(!raw) return;
  const p = parseRef(raw);
  const el = document.getElementById('bcontent');
  
  if(!p) {
    el.innerHTML = '<div style="color:#E08070; padding:20px">Riferimento non valido. Prova "Giovanni 3".</div>';
    return;
  }

  el.innerHTML = '<div class="spinner"></div>';
  
  try {
    const res = await fetch(`https://api.getbible.net/v2/riveduta/${p.num}/${p.ch}.json`);
    const data = await res.json();
    let vs = data.verses;
    if (p.vf) { const vt=p.vt||p.vf; vs=vs.filter(v=>v.verse>=p.vf&&v.verse<=vt); }
    
    let html = `<div class="ch-head">${p.label} ${p.ch}${p.vf?':'+p.vf+(p.vt?'-'+p.vt:''):''}</div>`;
    vs.forEach(v => {
      html += `
        <div class="verse-wrap">
          <div class="verse">
            <span class="vnum">${v.verse}</span>
            <span class="vtxt">${v.text}</span>
            <span class="vstudy-btn" title="Studio profondo" onclick="toggleStudy(${p.num}, ${p.ch}, ${v.verse}, this)">✦</span>
          </div>
          <div class="study-box" id="study-${p.num}-${p.ch}-${v.verse}"></div>
        </div>`;
    });
    el.innerHTML = html;
    document.getElementById('p-bibbia').scrollTop = 0;
  } catch(e) { el.innerHTML = '<div class="err">Errore nel caricamento dei dati.</div>'; }
}

// ═══════════════════════════════════════════════
// STUDIO PROFONDO (NKJV + ORIGINALI)
// ═══════════════════════════════════════════════
async function toggleStudy(bid, ch, vs, btn) {
  const box = document.getElementById(`study-${bid}-${ch}-${vs}`);
  if (box.style.display === 'block') {
    box.style.display = 'none';
    btn.style.color = 'var(--mu)';
    return;
  }
  
  box.style.display = 'block';
  box.innerHTML = '<div class="spinner" style="margin:10px 0"></div>';
  btn.style.color = 'var(--gold)';

  try {
    // 1. NKJV (Inglese)
    const resEng = await fetch(`https://api.getbible.net/v2/nkjv/${bid}/${ch}.json`);
    const dEng = await resEng.json();
    const vEng = dEng.verses.find(v => v.verse === vs)?.text || "Non disponibile";

    // 2. Originale (Greco TR per NT, Ebraico WLC per AT)
    const lang = bid >= 40 ? 'tr' : 'wlc';
    const resOri = await fetch(`https://api.getbible.net/v2/${lang}/${bid}/${ch}.json`);
    const dOri = await resOri.json();
    const vOri = dOri.verses.find(v => v.verse === vs)?.text || "Non disponibile";

    box.innerHTML = `
      <div><strong>NKJV (Studio Inglese)</strong>${vEng}</div>
      <div style="direction:${bid < 40 ? 'rtl' : 'ltr'};">
        <strong>Lingua Originale (${lang.toUpperCase()})</strong>${vOri}
      </div>
    `;
  } catch(e) {
    box.innerHTML = '<div style="color:var(--mu); font-size:12px">Impossibile caricare i testi di studio.</div>';
  }
}

// VOTD Semplice
document.getElementById('vtxt').textContent = "Io posso ogni cosa in Cristo che mi fortifica.";
document.getElementById('vref').textContent = "— Filippesi 4:13";

// Enter key support
document.getElementById('bIn').addEventListener('keypress', e => { if(e.key==='Enter') searchBible(); });
</script>
</body>
</html>
