<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tenda di Convegno</title>
<meta name="theme-color" content="#1a1208">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tenda">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#C8A44A;--gold2:#E2C47A;
  --gd:rgba(200,164,74,0.13);--gb:rgba(200,164,74,0.22);
  --bg:#0D0B07;--s1:#1A1610;--s2:#221D13;--s3:#2A2418;
  --tx:#EDE5D0;--tx2:#B8A880;--mu:#6A5F42;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'EB Garamond',Georgia,serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
/* HEADER */
.hdr{flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--gb);padding:10px 16px;display:flex;align-items:center;gap:10px}
.brand{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.brand h1{font-family:'Cinzel',serif;font-size:16px;font-weight:600;color:var(--gold);letter-spacing:.04em;white-space:nowrap}
.brand p{font-size:8px;letter-spacing:.25em;text-transform:uppercase;color:var(--mu);margin-top:2px}
/* TABS */
.tabs{flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--gb);display:flex}
.tab{flex:1;background:none;border:none;border-bottom:2px solid transparent;color:var(--mu);font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;padding:12px 6px;cursor:pointer;transition:color .2s,border-color .2s}
.tab.on{color:var(--gold);border-bottom-color:var(--gold)}
/* SEARCH BARS */
.sbar{flex-shrink:0;background:var(--s2);border-bottom:1px solid var(--gb);padding:9px 13px;gap:8px;display:none}
.sbar.show{display:flex}
.sbar input{flex:1;background:var(--bg);border:1px solid var(--gb);border-radius:6px;padding:8px 13px;color:var(--tx);font-family:'EB Garamond',serif;font-size:15px;outline:none;transition:border-color .2s,box-shadow .2s}
.sbar input:focus{border-color:var(--gold);box-shadow:0 0 0 3px var(--gd)}
.sbar input::placeholder{color:var(--mu)}
.btn{background:var(--gold);color:#0D0B07;border:none;border-radius:6px;padding:8px 15px;font-family:'Cinzel',serif;font-weight:600;font-size:12px;letter-spacing:.07em;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:background .2s}
/* PANELS */
.panels{flex:1;overflow:hidden;position:relative}
.panel{position:absolute;inset:0;overflow-y:auto;padding:18px 16px 40px;display:none;scrollbar-width:thin;scrollbar-color:var(--mu) transparent}
.panel.on{display:block}
/* BIBLE VERSES */
.ch-head{font-family:'Cinzel',serif;font-size:17px;font-weight:600;color:var(--gold);margin-bottom:14px;letter-spacing:.04em}
.verse{display:flex;gap:10px;margin-bottom:12px;position:relative}
.vnum{flex-shrink:0;font-family:'Cinzel',serif;font-size:9px;color:var(--gold);margin-top:6px;min-width:20px;text-align:right;opacity:.65}
.vtxt{font-size:18px;line-height:1.78;flex:1}
.vstudy-btn{color:var(--mu);cursor:pointer;font-size:14px;padding:4px;transition:color .2s}
.vstudy-btn:hover{color:var(--gold)}
/* STUDY MODAL/AREA */
.study-box{background:var(--s2);border-left:3px solid var(--gold);padding:12px;margin:8px 0 15px 30px;font-size:15px;display:none}
.study-box div{margin-bottom:8px}
.study-box strong{font-family:'Cinzel',serif;font-size:10px;color:var(--gold2);display:block;margin-bottom:2px}
/* DIZIONARIO */
.dict-card{background:var(--s2);border:1px solid var(--gb);border-radius:10px;padding:18px 20px 22px;margin-top:4px}
.dict-term{font-family:'Cinzel',serif;font-size:20px;font-weight:600;color:var(--gold);margin-bottom:3px}
.dict-body{font-size:17px;line-height:1.85;margin-top:12px}
.dict-body h3{font-family:'Cinzel',serif;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--gold2);margin:16px 0 5px}
/* VOTD */
.votd{background:linear-gradient(135deg,var(--s2),var(--s3));border:1px solid var(--gb);border-radius:10px;padding:20px 22px;margin-bottom:22px;position:relative}
.votd-txt{font-size:20px;line-height:1.65;font-style:italic;margin-bottom:12px}
.votd-ref{font-family:'Cinzel',serif;font-size:12px;color:var(--gold2);text-align:right}
/* MISC */
.spinner{width:26px;height:26px;border:2px solid var(--gd);border-top-color:var(--gold);border-radius:50%;animation:spin .75s linear infinite;margin:30px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.err{background:rgba(192,80,64,.1);border:1px solid rgba(192,80,64,.3);border-radius:8px;padding:12px 15px;color:#E08070;margin:10px 0}
#pwa{display:none;position:fixed;bottom:20px;left:20px;right:20px;background:var(--s3);border:1px solid var(--gold);padding:12px;border-radius:10px;z-index:100;align-items:center;gap:10px}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div class="brand">
      <span style="font-size:22px">⛺</span>
      <div><h1>Tenda di Convegno</h1><p>Studio Pentecostale Profondo</p></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab-home" onclick="showTab('home')">Oggi</button>
    <button class="tab" id="tab-bibbia" onclick="showTab('bibbia')">Bibbia</button>
    <button class="tab" id="tab-diz" onclick="showTab('diz')">Dizionario</button>
  </div>

  <div class="sbar" id="sbar-bibbia">
    <input id="bIn" placeholder="Es: Giovanni 3 o Romani 8:28..." autocomplete="off">
    <button class="btn" onclick="searchBible()">CERCA</button>
  </div>
  <div class="sbar" id="sbar-diz">
    <input id="dIn" placeholder="Cerca termine..." autocomplete="off">
    <button class="btn" onclick="searchDict()">CERCA</button>
  </div>

  <div class="panels">
    <div class="panel on" id="p-home">
      <div class="votd">
        <div id="vtxt" class="votd-txt"></div>
        <div id="vref" class="votd-ref"></div>
      </div>
      <p style="color:var(--mu);line-height:1.6">Usa l'icona ✦ nei versetti per confrontare la versione <strong>NKJV</strong> e il testo <strong>Originale</strong>.</p>
    </div>

    <div class="panel" id="p-bibbia">
      <div id="bcontent"></div>
    </div>

    <div class="panel" id="p-diz">
      <div id="dcontent"></div>
    </div>
  </div>

  <div id="pwa">
    <p style="flex:1;font-size:14px">Aggiungi alla Home per un'esperienza migliore.</p>
    <button class="btn" id="pwa-inst">INSTALLA</button>
  </div>
</div>

<script>
// CONFIG & DATA
const VOTD = [["Giovanni 3:16", "Poiché Iddio ha tanto amato il mondo, che ha dato il suo unigenito Figliuolo..."]];
const BOOKS = [[1,['genesi','gen'],'Genesi'],[43,['giovanni','gv'],'Giovanni'],[45,['romani','rom'],'Romani'] /* ... altri libri qui ... */];

function showTab(n){
  ['home','bibbia','diz'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('on',t===n);
    document.getElementById('p-'+t).classList.toggle('on',t===n);
    const sb = document.getElementById('sbar-'+t); if(sb) sb.classList.toggle('show',t===n);
  });
}

// BIBLE SEARCH
async function searchBible() {
  const raw = document.getElementById('bIn').value.trim();
  const el = document.getElementById('bcontent');
  el.innerHTML = '<div class="spinner"></div>';
  
  // Semplificato per brevità, usa la logica di parseRef del file precedente
  const bookId = 43; // Esempio Giovanni
  const chapter = 3; 

  try {
    const res = await fetch(`https://api.getbible.net/v2/riveduta/${bookId}/${chapter}.json`);
    const data = await res.json();
    let html = `<div class="ch-head">${data.book_name} ${data.chapter}</div>`;
    
    data.verses.forEach(v => {
      html += `
        <div class="verse-wrap">
          <div class="verse">
            <span class="vnum">${v.verse}</span>
            <span class="vtxt">${v.text}</span>
            <span class="vstudy-btn" onclick="toggleStudy(${bookId}, ${chapter}, ${v.verse}, this)">✦</span>
          </div>
          <div class="study-box" id="study-${bookId}-${chapter}-${v.verse}">Caricamento studio...</div>
        </div>`;
    });
    el.innerHTML = html;
  } catch(e) { el.innerHTML = '<div class="err">Errore caricamento.</div>'; }
}

// STUDIO PROFONDO (NKJV & ORIGINALE)
async function toggleStudy(bid, ch, vs, btn) {
  const box = document.getElementById(`study-${bid}-${ch}-${vs}`);
  if (box.style.display === 'block') {
    box.style.display = 'none';
    return;
  }
  
  box.style.display = 'block';
  btn.style.color = 'var(--gold)';

  try {
    // Recupero NKJV (Inglese)
    const resEng = await fetch(`https://api.getbible.net/v2/nkjv/${bid}/${ch}.json`);
    const dataEng = await resEng.json();
    const vEng = dataEng.verses.find(v => v.verse === vs)?.text || "N/A";

    // Recupero Originale (Greco TR per NT, Ebraico per AT)
    const lang = bid >= 40 ? 'tr' : 'wlc'; // Textus Receptus per NT, Leningrad Codex per AT
    const resOri = await fetch(`https://api.getbible.net/v2/${lang}/${bid}/${ch}.json`);
    const dataOri = await resOri.json();
    const vOri = dataOri.verses.find(v => v.verse === vs)?.text || "N/A";

    box.innerHTML = `
      <div><strong>NKJV (English)</strong> ${vEng}</div>
      <div style="direction:${bid < 40 ? 'rtl' : 'ltr'}; font-size:1.1em;">
        <strong>Testo Originale (${lang.toUpperCase()})</strong> ${vOri}
      </div>
    `;
  } catch(e) {
    box.innerHTML = '<div class="err">Impossibile recuperare i testi di studio.</div>';
  }
}

// Inizializzazione VOTD e PWA (come prima)
document.getElementById('vtxt').textContent = VOTD[0][1];
document.getElementById('vref').textContent = VOTD[0][0];

document.getElementById('bIn').addEventListener('keypress', e => { if(e.key==='Enter') searchBible(); });
</script>
</body>
</html>
