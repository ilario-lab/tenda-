name: Meditazione Giornaliera

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  genera:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Genera meditazione
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python3 genera_meditazione.py

      - name: Commit e push
        run: |
          git config user.name "Meditazione Bot"
          git config user.email "bot@tenda"
          git add meditazione.json
          git diff --staged --quiet || git commit -m "Meditazione del $(date +'%d/%m/%Y')"
          git push
